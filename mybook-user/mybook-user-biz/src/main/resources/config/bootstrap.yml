spring:
  application:
    name: mybook-user # 应用名称
  profiles:
    active: dev # 默认激活 dev 本地开发环境
  cloud:
    nacos:
      discovery:
        enabled: true # 启用服务发现
        group: DEFAULT_GROUP # 所属组
        namespace: mybook # 命名空间
        server-addr: http://192.168.170.142:8848 # 指定 Nacos 配置中心的服务器地址
      config:
        enabled: true
        prefix: ${spring.application.name}
        group: DEFAULT_GROUP
        namespace: mybook
        file-extension: yaml
        refresh-enabled: true
        server-addr: http://192.168.170.142:8848