server:
  port: 8091 # 项目启动的端口

spring:
  profiles:
    active: dev # 默认激活 dev 本地开发环境
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/mybook?useUnicode=true&characterEncoding=utf-8&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: D9hmv8VDfjeM11NprH/Vjo+xPhPQHStxnEepT1t2HePNBknhEAoC9I004lHpO2kWuK2n5yQs9y15TdK+DdurDw==
    type: com.alibaba.druid.pool.DruidDataSource

  data:
    redis:
      database: 0 # Redis 数据库索引（默认为 0）
      host: 192.168.170.142 # Redis 服务器地址
      port: 6379 # Redis 服务器连接端口
      password: 062690 # Redis 服务器连接密码（默认为空）
      timeout: 5s # 读超时时间
      connect-timeout: 5s # 链接超时时间
      lettuce:
        pool:
          max-active: 200 # 连接池最大连接数
          max-wait: -1ms # 连接池最大阻塞等待时间（使用负值表示没有限制）
          min-idle: 0 # 连接池中的最小空闲连接
          max-idle: 10 # 连接池中的最大空闲连接

mybatis:
  # MyBatis xml 配置文件路径
  mapper-locations: classpath:/mapper/**/*.xml

logging:
  level:
    com.geometry.mybook.user.relation.biz.mapper: debug

mq-consumer: #mq消费者
  follow-unfollow: #关注、取关操作
    rate-limit: 5000 #每秒限流阈值
