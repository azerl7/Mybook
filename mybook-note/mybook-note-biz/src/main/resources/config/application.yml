server:
  port: 8087 # 项目启动的端口

spring:
  profiles:
    active: dev # 默认激活 dev 本地开发环境
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/mybook?useUnicode=true&characterEncoding=utf-8&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: D9hmv8VDfjeM11NprH/Vjo+xPhPQHStxnEepT1t2HePNBknhEAoC9I004lHpO2kWuK2n5yQs9y15TdK+DdurDw==
    type: com.alibaba.druid.pool.DruidDataSource

  data:
    redis:
      database: 0 # Redis 数据库索引（默认为 0）
      host: 192.168.170.142 # Redis 服务器地址
      port: 6379 # Redis 服务器连接端口
      password: 062690 # Redis 服务器连接密码（默认为空）
      timeout: 5s # 读超时时间
      connect-timeout: 5s # 链接超时时间
      lettuce:
        pool:
          max-active: 200 # 连接池最大连接数
          max-wait: -1ms # 连接池最大阻塞等待时间（使用负值表示没有限制）
          min-idle: 0 # 连接池中的最小空闲连接
          max-idle: 10 # 连接池中的最大空闲连接

mybatis:
  # MyBatis xml 配置文件路径
  mapper-locations: classpath:/mapper/**/*.xml

rocketmq:
  name-server: 192.168.170.142:9876 # name server 地址
  producer:
    group: mybook_group
    send-message-timeout: 3000 # 消息发送超时时间，默认 3s
    retry-times-when-send-failed: 3 # 同步发送消息失败后，重试的次数
    retry-times-when-send-async-failed: 3 # 异步发送消息失败后，重试的次数
    max-message-size: 4096 # 消息最大大小（单位：字节）
  consumer:
    group: mybook_group
    pull-batch-size: 5 # 每次拉取的最大消息数